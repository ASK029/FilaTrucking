services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: fila-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: filatrucking
      MYSQL_USER: filatrucking
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    # Port 3306 exposed only for local development - for production use internal network
    # ports:
    #   - "3306:3306"
    networks:
      - fila-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Django Application
  django:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fila-django
    restart: unless-stopped
    environment:
      - DATABASE_URL=mysql://filatrucking:${MYSQL_PASSWORD}@mysql:3306/filatrucking
      - SECRET_KEY=${SECRET_KEY}
      - DEBUG=${DEBUG:-False}
      - WHATSAPP_INGEST_SECRET=fila_secret_2026
      - WHATSAPP_SIDECAR_URL=http://sidecar:3001
    volumes:
      - ./FilaTrucking/media:/app/FilaTrucking/media
      - staticfiles:/app/FilaTrucking/staticfiles
      - ./.env:/app/.env:ro
    ports:
      - "8888:8000"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - fila-network
    command: gunicorn FilaTrucking.wsgi:application --bind 0.0.0.0:8000 --workers 4

  # WhatsApp Sidecar (Node.js)
  sidecar:
    build:
      context: ./sidecar
      dockerfile: Dockerfile
    container_name: fila-whatsapp-sidecar
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - DJANGO_API_URL=http://django:8000/shipments/api/ingest/
      - DJANGO_SECRET=${DJANGO_SECRET}
    volumes:
      - auth_data:/app/sidecar/auth_data
    ports:
      - "3001:3001"
    depends_on:
      - django
    networks:
      - fila-network

  # Nginx Reverse Proxy (optional - for future HTTPS)
  nginx:
    image: nginx:alpine
    container_name: fila-nginx
    restart: unless-stopped
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - staticfiles:/staticfiles
      - ./FilaTrucking/media:/media:ro
    ports:
      - "80:80"
      # - "443:443"  # Uncomment when you have SSL certificates
    depends_on:
      - django
    networks:
      - fila-network

networks:
  fila-network:
    driver: bridge

volumes:
  mysql_data:
  auth_data:
  staticfiles: