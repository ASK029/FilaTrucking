{% extends "base.html" %} {% block content %}
<h1>{% if form.instance.pk %}Edit Shipment{% else %}Add Shipment{% endif %}</h1>

<form method="post">
  {% csrf_token %}
  <table>
    {{ form.as_table }}
  </table>
  <button type="submit">Save</button>
</form>

<p><a href="{% url 'shipment_list' %}">Back to list</a></p>
{% endblock %}
