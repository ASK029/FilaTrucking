{% extends "base.html" %} {% block content %}
<h1>Delete Shipment</h1>

<p>Are you sure you want to delete shipment "{{ object.booking }}"?</p>

<form method="post">
  {% csrf_token %}
  <button type="submit">Yes, delete</button>
  <a href="{% url 'shipment_detail' object.pk %}">Cancel</a>
</form>
{% endblock %}
