{% extends "base.html" %} {% block content %}
<h1>{% if form.instance.pk %}Edit Vehicle{% else %}Add Vehicle{% endif %}</h1>
<form
  method="post"
  enctype="multipart/form-data">
  {% csrf_token %}
  <table>
    {{ form.as_table }}
  </table>
  <button type="submit">Save</button>
</form>
<p><a href="{% url 'vehicle_list' %}">Back to list</a></p>
{% endblock %}
