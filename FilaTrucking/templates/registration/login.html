{% extends "base.html" %}

{% block content %}
<h2>Admin Login</h2>

<form method="post">
    {% csrf_token %}

    {{ form.non_field_errors }}

    <div>
        <label>Username</label><br>
        {{ form.username }}
    </div>

    <div>
        <label>Password</label><br>
        {{ form.password }}
    </div>

    <button type="submit">Login</button>
</form>
{% endblock %}
